services:
  sicop-ag:
    build: .
    image: sicop-ag:latest
    container_name: sicop-ag
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Mecanismo de auto-recuperación (Avance #5.4): si el proceso muere por
    # una falla crítica, el motor de contenedores lo reinicia automáticamente.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - audit-data:/app/data

volumes:
  audit-data:
