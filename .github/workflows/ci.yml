name: Integración Continua (P2P Mesh)

# Se ejecuta automáticamente al abrir o actualizar un PR hacia main o develop
on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  validacion-defensiva:
    name: Análisis Estático y Pruebas
    runs-on: ubuntu-latest

    steps:
      - name:  Clonar el repositorio
        uses: actions/checkout@v4

      - name:  Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Acelera las ejecuciones futuras

      - name:  Instalar dependencias limpias
        run: npm ci

      - name:  Ejecutar Linter (Revisión de sintaxis)
        run: npm run lint --if-present

      - name:  Ejecutar Pruebas Unitarias
        run: npm test --if-present